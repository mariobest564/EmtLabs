<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: layout(~{::body})">
<head></head>
<body>
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Authors</h2>
    <a class="btn btn-primary" th:href="@{/authors/add}">Add Author</a>
</div>
<table class="table table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Surname</th>
        <th>Country</th>
        <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="author : ${authors}">
        <td th:text="${author.id}"></td>
        <td th:text="${author.name}"></td>
        <td th:text="${author.surname}"></td>
        <td th:text="${author.country != null ? author.country.name : 'N/A'}"></td>
        <td class="text-end">
            <a class="btn btn-sm btn-outline-secondary" th:href="@{/authors/{id}/edit(id=${author.id})}">Edit</a>
            <form th:action="@{/authors/{id}/delete(id=${author.id})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this author?')">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
