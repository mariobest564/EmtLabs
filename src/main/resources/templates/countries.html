<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: layout(~{::body})">
<head></head>
<body>
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Countries</h2>
    <a class="btn btn-primary" th:href="@{/countries/add}">Add Country</a>
</div>
<table class="table table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Continent</th>
        <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="country : ${countries}">
        <td th:text="${country.id}"></td>
        <td th:text="${country.name}"></td>
        <td th:text="${country.continent}"></td>
        <td class="text-end">
            <a class="btn btn-sm btn-outline-secondary" th:href="@{/countries/{id}/edit(id=${country.id})}">Edit</a>
            <form th:action="@{/countries/{id}/delete(id=${country.id})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this country?')">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
